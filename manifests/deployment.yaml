apiVersion: apps/v1
kind: Deployment
metadata:
  name: gitops-demo-api
  labels:
    app: gitops-demo-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gitops-demo-api
  template:
    metadata:
      labels:
        app: gitops-demo-api
    spec:
      containers:
        - name: gitops-demo-api
          image: 780770254184.dkr.ecr.ap-south-1.amazonaws.com/gitops-demo-api:v1
          ports:
            - containerPort: 8080
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
